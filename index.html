<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺北市立圖書館 水果轉盤抽籤系統</title>
    <style>
        :root {
            --bg-color: #0d1b2a;
            --panel-bg: #1b263b;
            --accent-gold: #ffb703;
            --accent-red: #e63946;
            --text-light: #f1faee;
            --border-color: #415a77;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 10px;
            width: 100%;
            max-width: 1000px;
        }

        header h1 {
            color: var(--accent-gold);
            font-size: 1.8rem;
            text-shadow: 0 0 10px rgba(255, 183, 3, 0.4);
        }

        .main-layout {
            display: flex;
            flex-direction: row;
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 轉盤區塊 */
        .wheel-container {
            flex: 1;
            min-width: 340px;
            max-width: 450px;
            background: var(--panel-bg);
            border: 3px solid var(--accent-gold);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .status-badge {
            background: #2a9d8f;
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .current-target {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 15px;
            min-height: 2rem;
            text-align: center;
        }

        /* 水果轉盤本體 */
        .wheel-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 20px;
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid var(--accent-red);
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }

        .btn-spin {
            width: 80%;
            padding: 12px 0;
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(180deg, #ffb703 0%, #fb8500 100%);
            color: #000;
            border: 2px solid #fff;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 183, 3, 0.4);
            transition: all 0.2s;
        }

        .btn-spin:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 183, 3, 0.7);
        }

        .btn-spin:disabled {
            background: #555;
            color: #888;
            border-color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-reset {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 0.85rem;
            background: transparent;
            color: #aaa;
            border: 1px solid #555;
            border-radius: 20px;
            cursor: pointer;
        }

        .btn-reset:hover {
            color: #fff;
            border-color: #fff;
        }

        /* 右側分館列表 */
        .results-section {
            flex: 1.2;
            min-width: 320px;
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .results-section h2 {
            color: var(--accent-gold);
            font-size: 1.2rem;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .results-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 520px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .result-card {
            background: #0d1b2a;
            border-radius: 8px;
            padding: 10px 14px;
            border: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .result-card:hover:not(.completed) {
            border-color: var(--accent-gold);
            background: #1e3a5f;
        }

        .result-card.selected-active {
            border-color: var(--accent-gold) !important;
            background: #2a4d7c !important;
            box-shadow: 0 0 10px rgba(255, 183, 3, 0.5);
        }

        .result-card.completed {
            border-color: #2a9d8f;
            opacity: 0.75;
            background: #0d2818;
            cursor: default;
        }

        .branch-info {
            display: flex;
            flex-direction: column;
        }

        .branch-name {
            font-weight: bold;
            font-size: 1rem;
            color: #fff;
        }

        .branch-tag {
            font-size: 0.75rem;
            color: #a8dadc;
        }

        .committee-tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .tag {
            background: rgba(255, 183, 3, 0.2);
            color: var(--accent-gold);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 183, 3, 0.4);
        }

        .tag.free {
            background: rgba(42, 157, 143, 0.3);
            color: #2a9d8f;
            border-color: #2a9d8f;
        }

        /* Toast 提示浮窗 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-gold);
            color: #000;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎡 臺北市立圖書館 水果轉盤抽籤系統</h1>
        <p>請先點選右側「分館」，再按轉盤「開始旋轉抽籤」</p>
    </header>

    <div class="main-layout">
        <!-- 左側水果轉盤區 -->
        <div class="wheel-container">
            <div id="statusBadge" class="status-badge">請先點選分館</div>
            <div id="currentTarget" class="current-target">👉 請點選右側分館開始</div>

            <div class="wheel-wrapper">
                <div class="pointer"></div>
                <canvas id="wheelCanvas" width="320" height="320"></canvas>
            </div>

            <button id="spinBtn" class="btn-spin" onclick="spinWheel()" disabled>🎰 開始旋轉抽籤</button>
            <button class="btn-reset" onclick="resetAll()">🔄 重置所有抽籤紀錄</button>
        </div>

        <!-- 右側 11 分館狀態區 -->
        <div class="results-section">
            <h2>📋 分館清單與抽籤結果</h2>
            <div id="resultsGrid" class="results-grid"></div>
        </div>
    </div>

    <div id="toast" class="toast">提示內容</div>

    <script>
        const ALL_BRANCHES = [
            "舊莊分館", "中崙分館", "三興分館", "民生分館", 
            "永春分館", "三民分館", "六合分館", "南港分館", 
            "松山分館", "啓明分館", "廣慈分館"
        ];

        const ALL_COMMITTEES = [
            "館藏發展委員會",
            "技術服務委員會",
            "讀者服務委員會",
            "推廣活動委員會",
            "資訊暨視聽服務委員會",
            "人力資源委員會",
            "分館興建規劃暨修建工程委員會",
            "為民服務暨業務考核委員會",
            "獲得免參加一次"
        ];

        // 轉盤扇形顏色組合（水果鮮豔風格）
        const SLICE_COLORS = [
            "#f94144", "#f3722c", "#f8961e", "#f9c74f", 
            "#90be6d", "#43aa8b", "#577590", "#277da1", "#9d4edd"
        ];

        let drawResults = {};
        let selectedBranch = null;
        let isSpinning = false;
        let currentRotation = 0; // 轉盤當前角度 (弧度)

        function init() {
            drawResults = {};
            ALL_BRANCHES.forEach(b => drawResults[b] = []);
            selectedBranch = null;
            isSpinning = false;

            renderResultsGrid();
            updateTopDisplay();
            drawWheel([]); // 預設顯示空白轉盤
        }

        // 判斷該館是否已完成
        function isBranchCompleted(branch) {
            const drawn = drawResults[branch] || [];
            if (branch === "松山分館") return drawn.length >= 1;
            if (drawn.includes("館藏發展委員會")) return true;
            return drawn.length >= 2;
        }

        // 統計全系統被抽中次數
        function getCommitteeCounts() {
            const counts = {};
            ALL_COMMITTEES.forEach(c => counts[c] = 0);
            Object.values(drawResults).forEach(list => {
                list.forEach(c => { if (counts[c] !== undefined) counts[c]++; });
            });
            return counts;
        }

        // 根據規則算出當前分館可抽取的選項
        function getAvailableOptions(branch) {
            if (!branch) return [];
            const drawnByThisBranch = drawResults[branch] || [];
            const globalCounts = getCommitteeCounts();
            const isFirstDraw = (drawnByThisBranch.length === 0);

            return ALL_COMMITTEES.filter(c => {
                // 1. 同館不重複抽中相同項目
                if (drawnByThisBranch.includes(c)) return false;

                // 2. 「獲得免參加一次」：絕不出現在第 1 支籤
                if (c === "獲得免參加一次" && isFirstDraw) return false;

                // 3. 「館藏發展委員會」特規：
                if (c === "館藏發展委員會") {
                    if (branch === "松山分館") return false; // 松山分館排除
                    if (!isFirstDraw) return false;          // 僅限第 1 支籤可抽
                    if (globalCounts[c] >= 1) return false;  // 全系統僅限 1 次
                } else if (c !== "獲得免參加一次") {
                    // 其他委員會全系統上限 2 次
                    if (globalCounts[c] >= 2) return false;
                }

                return true;
            });
        }

        // 繪製水果轉盤
        function drawWheel(options) {
            const canvas = document.getElementById("wheelCanvas");
            const ctx = canvas.getContext("2d");
            const width = canvas.width;
            const height = canvas.height;
            const radius = width / 2;

            ctx.clearRect(0, 0, width, height);

            if (!options || options.length === 0) {
                // 空白轉盤狀態
                ctx.beginPath();
                ctx.arc(radius, radius, radius - 5, 0, Math.PI * 2);
                ctx.fillStyle = "#2b2d42";
                ctx.fill();
                ctx.strokeStyle = "#ffb703";
                ctx.lineWidth = 4;
                ctx.stroke();

                ctx.fillStyle = "#8d99ae";
                ctx.font = "bold 16px sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("請選擇右側分館", radius, radius);
                return;
            }

            const numSlices = options.length;
            const sliceAngle = (Math.PI * 2) / numSlices;

            ctx.save();
            ctx.translate(radius, radius);
            ctx.rotate(currentRotation);

            for (let i = 0; i < numSlices; i++) {
                const angle = i * sliceAngle;
                
                // 畫扇形
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius - 5, angle, angle + sliceAngle);
                ctx.fillStyle = SLICE_COLORS[i % SLICE_COLORS.length];
                ctx.fill();
                ctx.strokeStyle = "#0d1b2a";
                ctx.lineWidth = 2;
                ctx.stroke();

                // 畫文字
                ctx.save();
                ctx.rotate(angle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 13px sans-serif";
                ctx.shadowColor = "rgba(0,0,0,0.8)";
                ctx.shadowBlur = 4;
                
                // 簡化過長名稱以利顯示
                let text = options[i];
                if (text.length > 8) text = text.substring(0, 7) + "…";
                
                ctx.fillText(text, radius - 18, 5);
                ctx.restore();
            }

            // 中心圓鈕
            ctx.beginPath();
            ctx.arc(0, 0, 25, 0, Math.PI * 2);
            ctx.fillStyle = "#ffb703";
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.restore();
        }

        function renderResultsGrid() {
            const grid = document.getElementById("resultsGrid");
            grid.innerHTML = "";

            ALL_BRANCHES.forEach((branch, idx) => {
                const card = document.createElement("div");
                card.id = `card-${idx}`;
                card.className = "result-card";
                card.onclick = () => selectBranch(branch, idx);

                const drawn = drawResults[branch] || [];
                const isComp = isBranchCompleted(branch);

                let tagInfo = branch === "松山分館" ? "特規:僅抽1次" : "可抽 2 次";

                card.innerHTML = `
                    <div class="branch-info">
                        <span class="branch-name">${branch}</span>
                        <span class="branch-tag">${tagInfo}</span>
                    </div>
                    <div class="committee-tags" id="tags-${idx}">
                        ${drawn.length > 0 ? drawn.map(c => `<span class="tag ${c==='獲得免參加一次'?'free':''}">${c}</span>`).join('') : '<span style="color:#666;font-size:0.8rem;">尚未抽取</span>'}
                    </div>
                `;
                grid.appendChild(card);
            });
            updateCardHighlights();
        }

        function selectBranch(branch, idx) {
            if (isSpinning) return;

            if (isBranchCompleted(branch)) {
                showToast(`【${branch}】已完成所有抽籤！`);
                return;
            }

            selectedBranch = branch;
            updateTopDisplay();
            updateCardHighlights();

            const options = getAvailableOptions(selectedBranch);
            drawWheel(options);
        }

        function updateTopDisplay() {
            const badge = document.getElementById("statusBadge");
            const target = document.getElementById("currentTarget");
            const spinBtn = document.getElementById("spinBtn");

            if (!selectedBranch) {
                badge.innerText = "請先點選分館";
                badge.style.background = "#2a9d8f";
                target.innerText = "👉 請點選右側分館開始";
                spinBtn.disabled = true;
            } else {
                const drawn = drawResults[selectedBranch] || [];
                const drawNum = drawn.length + 1;
                badge.innerText = "準備抽籤中";
                badge.style.background = "#ffb703";
                badge.style.color = "#000";
                target.innerText = `已選擇：【${selectedBranch}】 (第 ${drawNum} 籤)`;
                spinBtn.disabled = false;
            }
        }

        function updateCardHighlights() {
            ALL_BRANCHES.forEach((b, idx) => {
                const card = document.getElementById(`card-${idx}`);
                if (!card) return;

                card.classList.remove("selected-active", "completed");

                if (isBranchCompleted(b)) {
                    card.classList.add("completed");
                } else if (b === selectedBranch) {
                    card.classList.add("selected-active");
                }
            });
        }

        // 旋轉轉盤核心邏輯
        function spinWheel() {
            if (isSpinning || !selectedBranch) return;

            const options = getAvailableOptions(selectedBranch);
            if (options.length === 0) {
                showToast(`【${selectedBranch}】目前無可抽取選項！`);
                return;
            }

            isSpinning = true;
            document.getElementById("spinBtn").disabled = true;

            // 隨機選定中獎索引
            const selectedIndex = Math.floor(Math.random() * options.length);
            const selectedResult = options[selectedIndex];

            // 計算旋轉角度
            const numSlices = options.length;
            const sliceAngle = (Math.PI * 2) / numSlices;
            
            // 指針固定在正上方 (3*PI/2)
            // 目標扇形中心角度為：selectedIndex * sliceAngle + sliceAngle / 2
            const targetSliceAngle = selectedIndex * sliceAngle + sliceAngle / 2;
            
            // 算需要的轉盤旋轉角度：(3*PI/2) - targetSliceAngle
            const targetAngle = (Math.PI * 1.5) - targetSliceAngle;
            
            // 加上 5 ~ 8 圈的多餘轉速 (大轉盤效果)
            const extraRounds = (5 + Math.floor(Math.random() * 3)) * (Math.PI * 2);
            
            const startAngle = currentRotation;
            const finalAngle = startAngle + extraRounds + ((targetAngle - (startAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2));

            const duration = 4000; // 旋轉 4 秒
            const startTime = performance.now();

            function animateWheel(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // Ease-out 減速效果
                const easeOut = 1 - Math.pow(1 - progress, 3);
                currentRotation = startAngle + (finalAngle - startAngle) * easeOut;

                drawWheel(options);

                if (progress < 1) {
                    requestAnimationFrame(animateWheel);
                } else {
                    // 旋轉完成處理
                    isSpinning = false;
                    const activeBranch = selectedBranch;
                    drawResults[activeBranch].push(selectedResult);

                    if (isBranchCompleted(activeBranch)) {
                        selectedBranch = null;
                    }

                    renderResultsGrid();
                    updateTopDisplay();

                    if (!selectedBranch) {
                        drawWheel([]);
                    } else {
                        drawWheel(getAvailableOptions(selectedBranch));
                    }

                    // 觸發特殊提示
                    if (selectedResult === "館藏發展委員會" && activeBranch !== "松山分館") {
                        showToast(`🎉 【${activeBranch}】抽中館藏發展委員會，額滿免抽第2籤！`);
                    } else if (selectedResult === "獲得免參加一次") {
                        showToast(`🎁 恭喜【${activeBranch}】抽中「獲得免參加一次」！`);
                    } else {
                        showToast(`🎉 【${activeBranch}】抽中了：${selectedResult}`);
                    }
                }
            }

            requestAnimationFrame(animateWheel);
        }

        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.innerText = msg;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 3500);
        }

        function resetAll() {
            if (confirm("確定要重置所有紀錄嗎？")) {
                init();
                showToast("已重置所有資料！");
            }
        }

        window.onload = init;
    </script>
</body>
</html>
