<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圖書館委員會抽籤系統</title>
  <style>
    :root {
      --primary-color: #2c3e50;
      --secondary-color: #3498db;
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-color: #333333;
    }

    body {
      font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 580px;
      padding: 30px;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      color: var(--primary-color);
      font-size: 1.6rem;
    }

    .config-panel {
      background: #edf2f7;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 0.95rem;
    }

    .checkbox-label {
      cursor: pointer;
      font-weight: bold;
      color: #c0392b;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-info {
      font-size: 0.9rem;
      color: #7f8c8d;
      margin-bottom: 6px;
    }

    .display-box {
      background: linear-gradient(135deg, #2c3e50, #3498db);
      color: white;
      font-size: 1.3rem;
      font-weight: bold;
      min-height: 110px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
      margin: 15px 0;
      padding: 15px;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
      word-break: break-all;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    button {
      background: var(--secondary-color);
      color: white;
      border: none;
      padding: 12px 18px;
      font-size: 0.95rem;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, background-color 0.2s;
      flex: 1;
    }

    button:hover {
      background-color: #2980b9;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      background-color: #bdc3c7;
      cursor: not-allowed;
    }

    button.btn-next-branch {
      background-color: #27ae60;
    }

    button.btn-next-branch:hover {
      background-color: #219653;
    }

    button.btn-reset {
      background-color: #e74c3c;
    }

    button.btn-reset:hover {
      background-color: #c0392b;
    }

    .history {
      margin-top: 25px;
      text-align: left;
      border-top: 2px solid #eee;
      padding-top: 15px;
    }

    .history h2 {
      font-size: 1.05rem;
      color: #7f8c8d;
      margin-bottom: 10px;
    }

    .history ol {
      padding-left: 20px;
      margin: 0;
      max-height: 180px;
      overflow-y: auto;
    }

    .history li {
      margin-bottom: 6px;
      font-size: 0.95rem;
      color: #34495e;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>圖書館委員會抽籤系統</h1>

    <!-- 模式選擇 -->
    <div class="config-panel">
      <label class="checkbox-label">
        <input type="checkbox" id="songshanToggle" onchange="switchBranchMode()">
        開啟「松山分館」模式（只抽 1 次，排除館藏發展）
      </label>
    </div>

    <div id="branchStatus" class="status-info">目前狀態：普通分館（準備第 1 次抽籤 / 共 2 次）</div>
    <div id="poolStatus" class="status-info">剩餘正式委員會：計算中...</div>
    
    <div id="resultDisplay" class="display-box">
      點擊「開始抽籤」按鈕
    </div>

    <div class="btn-group">
      <button id="drawBtn" onclick="draw()">開始抽籤</button>
      <button class="btn-next-branch" onclick="nextBranch()">換下一分館</button>
      <button class="btn-reset" onclick="resetDraw()">重置全系統</button>
    </div>

    <div class="history">
      <h2>抽出紀錄歷史：</h2>
      <ol id="historyList"></ol>
    </div>
  </div>

  <script>
    // 預設可抽取的 8 個正式委員會名單（抽完即移除）
    const initialFormalCommittees = [
      "館藏發展委員會",
      "技術服務委員會",
      "讀者服務委員會",
      "推廣活動委員會",
      "資訊暨視聽服務委員會",
      "人力資源委員會",
      "分館興建規劃暨修建工程委員會",
      "為民服務暨業務考核委員會"
    ];

    const freePassOption = "恭喜不用參加第二個委員會"; // 僅限第二支籤使用的底牌項目

    let remainingFormalCommittees = [...initialFormalCommittees];
    let branchDrawCount = 0; // 當前分館已抽次數
    let isRolling = false;

    // 切換分館模式（松山 vs 普通）
    function switchBranchMode() {
      if (isRolling) return;
      branchDrawCount = 0;
      document.getElementById("resultDisplay").innerText = "已準備好，請點擊「開始抽籤」";
      updateUI();
    }

    // 換下一個分館
    function nextBranch() {
      if (isRolling) return;
      branchDrawCount = 0;
      document.getElementById("resultDisplay").innerText = "已準備好，請點擊「開始抽籤」";
      updateUI();
    }

    // 依據規則取得當前可供抽選的籤筒項目集合
    function getCandidatePool() {
      const isSongshan = document.getElementById("songshanToggle").checked;

      // 先複製一份剩餘的正式委員會
      let pool = [...remainingFormalCommittees];

      // 松山分館（雖然只抽第 1 次）過濾掉「館藏發展委員會」
      if (isSongshan) {
        pool = pool.filter(item => item !== "館藏發展委員會");
      }

      // 判斷是【第 1 支籤】還是【第 2 支籤】
      if (branchDrawCount === 0) {
        // === 第 1 支籤 ===
        // 不加「恭喜不用...」，只從剩餘的正式委員會中抽
      } else if (branchDrawCount === 1) {
        // === 第 2 支籤 ===
        // 1. 自動過濾「館藏發展委員會」
        pool = pool.filter(item => item !== "館藏發展委員會");
        // 2. 加入「恭喜不用參加第二個委員會」至籤筒
        pool.push(freePassOption);
      }

      return pool;
    }

    function updateUI() {
      const isSongshan = document.getElementById("songshanToggle").checked;
      const drawBtn = document.getElementById("drawBtn");

      // 分館狀態提示
      if (isSongshan) {
        document.getElementById("branchStatus").innerText = `目前分館：【松山分館】（只抽 1 次 | 已抽 ${branchDrawCount}/1 次）`;
      } else {
        const nextDrawNum = branchDrawCount + 1;
        document.getElementById("branchStatus").innerText = `目前分館：【普通分館】（已抽 ${branchDrawCount}/2 次 ${branchDrawCount < 2 ? '→ 準備抽第 ' + nextDrawNum + ' 支籤' : ''}）`;
      }

      // 剩餘正式委員會提示
      const hasCollection = remainingFormalCommittees.includes("館藏發展委員會");
      const collectionText = hasCollection ? "🟢 館藏發展尚在" : "❌ 館藏發展已抽出";
      document.getElementById("poolStatus").innerText = `剩餘正式委員會：${remainingFormalCommittees.length} 個 (${collectionText})`;

      // 抽籤按鈕啟用/停用
      const maxAllowed = isSongshan ? 1 : 2;
      const candidatePool = getCandidatePool();
      
      // 次數滿了 或 籤筒無資料 時禁用按鈕
      drawBtn.disabled = (branchDrawCount >= maxAllowed) || (candidatePool.length === 0);
    }

    function draw() {
      if (isRolling) return;

      const isSongshan = document.getElementById("songshanToggle").checked;
      const maxAllowed = isSongshan ? 1 : 2;

      if (branchDrawCount >= maxAllowed) {
        alert("本分館抽籤次數已達上限！請點擊「換下一分館」。");
        return;
      }

      const candidatePool = getCandidatePool();
      if (candidatePool.length === 0) {
        alert("目前無可抽取的委員會籤！");
        return;
      }

      isRolling = true;

      const display = document.getElementById("resultDisplay");
      const drawBtn = document.getElementById("drawBtn");
      drawBtn.disabled = true;

      let counter = 0;
      const totalTicks = 20;  // 跑馬燈切換次數
      const intervalTime = 50; // 每一次切換毫秒數

      // 亂數跑馬燈動畫
      const timer = setInterval(() => {
        const randomIndex = Math.floor(Math.random() * candidatePool.length);
        display.innerText = candidatePool[randomIndex];
        counter++;

        if (counter >= totalTicks) {
          clearInterval(timer);
          
          // 隨機取出最終結果
          const finalIndex = Math.floor(Math.random() * candidatePool.length);
          const selected = candidatePool[finalIndex];

          branchDrawCount++;

          // 若抽中正式委員會，則從全域名額中扣除；若為「恭喜不用...」則不影響正式委員會名單
          if (selected !== freePassOption) {
            const indexInFormal = remainingFormalCommittees.indexOf(selected);
            if (indexInFormal !== -1) {
              remainingFormalCommittees.splice(indexInFormal, 1);
            }
          }

          // 新增歷史紀錄
          const historyList = document.getElementById("historyList");
          const li = document.createElement("li");
          const branchName = isSongshan ? "[松山分館]" : "[普通分館]";
          li.innerText = `${branchName} 第 ${branchDrawCount} 支籤：${selected}`;
          historyList.appendChild(li);

          isRolling = false;

          // 結果呈現邏輯：
          // 1. 普通分館第 1 支籤抽中「館藏發展委員會」 -> 不用抽第 2 支籤
          if (!isSongshan && selected === "館藏發展委員會") {
            display.innerText = `🎯 抽中【館藏發展委員會】！不用抽第二支籤`;
            branchDrawCount = 2; // 強制設定已滿 2 次，結束該館抽籤
          } 
          // 2. 本分館次數額滿
          else if (branchDrawCount >= maxAllowed) {
            display.innerText = `🎉 抽中：${selected} (本館抽籤完成)`;
          } 
          // 3. 還可以抽第 2 支籤
          else {
            display.innerText = `抽中：${selected} (請繼續抽第 2 支籤)`;
          }

          updateUI();
        }
      }, intervalTime);
    }

    function resetDraw() {
      if (isRolling) return;
      remainingFormalCommittees = [...initialFormalCommittees];
      branchDrawCount = 0;
      document.getElementById("songshanToggle").checked = false;
      document.getElementById("resultDisplay").innerText = "點擊「開始抽籤」按鈕";
      document.getElementById("historyList").innerHTML = "";
      updateUI();
    }

    // 初始化 UI
    updateUI();
  </script>
</body>
</html>
