<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圖書館委員會抽籤系統</title>
  <style>
    :root {
      --primary-color: #2c3e50;
      --secondary-color: #3498db;
      --accent-color: #e67e22;
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-color: #333333;
    }

    body {
      font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 550px;
      padding: 30px;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      color: var(--primary-color);
      font-size: 1.6rem;
    }

    .config-panel {
      background: #edf2f7;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      font-size: 0.95rem;
    }

    .checkbox-label {
      cursor: pointer;
      font-weight: bold;
      color: #c0392b;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-info {
      font-size: 0.9rem;
      color: #7f8c8d;
      margin-bottom: 10px;
    }

    .display-box {
      background: linear-gradient(135deg, #2c3e50, #3498db);
      color: white;
      font-size: 1.3rem;
      font-weight: bold;
      min-height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
      margin: 15px 0;
      padding: 15px;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
      word-break: break-all;
    }

    .btn-group {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    button {
      background: var(--secondary-color);
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, background-color 0.2s;
      flex: 1;
    }

    button:hover {
      background-color: #2980b9;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      background-color: #bdc3c7;
      cursor: not-allowed;
    }

    button.btn-reset {
      background-color: #e74c3c;
    }

    button.btn-reset:hover {
      background-color: #c0392b;
    }

    .history {
      margin-top: 25px;
      text-align: left;
      border-top: 2px solid #eee;
      padding-top: 15px;
    }

    .history h2 {
      font-size: 1.05rem;
      color: #7f8c8d;
      margin-bottom: 10px;
    }

    .history ol {
      padding-left: 20px;
      margin: 0;
      max-height: 200px;
      overflow-y: auto;
    }

    .history li {
      margin-bottom: 6px;
      font-size: 0.95rem;
      color: #34495e;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>委員會分館抽籤系統</h1>

    <!-- 模式與狀態設定區 -->
    <div class="config-panel">
      <label class="checkbox-label">
        <input type="checkbox" id="songshanToggle" onchange="toggleSongshanMode()">
        開啟「松山分館」抽籤模式
      </label>
    </div>

    <div id="branchStatus" class="status-info">目前狀態：普通分館（本館已抽 0 / 2 個）</div>
    <div id="poolStatus" class="status-info">籤筒剩餘：15 籤</div>
    
    <div id="resultDisplay" class="display-box">
      點擊「開始抽籤」按鈕
    </div>

    <div class="btn-group">
      <button id="drawBtn" onclick="draw()">開始抽籤</button>
      <button class="btn-reset" onclick="resetDraw()">重新開始 (重置全系統)</button>
    </div>

    <div class="history">
      <h2>全案已抽出紀錄：</h2>
      <ol id="historyList"></ol>
    </div>
  </div>

  <script>
    // 預設全域籤筒：館藏 1 票，其餘各 2 票
    const basePool = [
      "館藏發展委員會",
      "技術服務委員會", "技術服務委員會",
      "讀者服務委員會", "讀者服務委員會",
      "推廣活動委員會", "推廣活動委員會",
      "資訊暨視聽服務委員會", "資訊暨視聽服務委員會",
      "人力資源委員會", "人力資源委員會",
      "分館興建規劃暨修建工程委員會", "分館興建規劃暨修建工程委員會",
      "為民服務暨業務考核委員會", "為民服務暨業務考核委員會"
    ];

    let currentPool = [...basePool];
    let branchDrawCount = 0; // 當前分館已抽次數 (最多 2 次)
    let isRolling = false;

    // 切換松山分館模式
    function toggleSongshanMode() {
      const isSongshan = document.getElementById("songshanToggle").checked;
      branchDrawCount = 0; // 切換分館時重置該館抽籤計數
      updateUI();
    }

    // 取得當前合格的籤筒選項（若為松山分館則過濾掉「館藏發展委員會」）
    function getValidPool() {
      const isSongshan = document.getElementById("songshanToggle").checked;
      if (isSongshan) {
        return currentPool.filter(item => item !== "館藏發展委員會");
      }
      return currentPool;
    }

    function updateUI() {
      const isSongshan = document.getElementById("songshanToggle").checked;
      const validPool = getValidPool();

      // 更新分館狀態提示
      const branchText = isSongshan ? "【松山分館】（排除館藏發展委員會）" : "【普通分館】";
      document.getElementById("branchStatus").innerText = `目前分館：${branchText} | 本館已抽：${branchDrawCount} / 2 個`;

      // 更新籤筒數量提示
      document.getElementById("poolStatus").innerText = `全域籤筒剩餘：${currentPool.length} 籤 (當前可抽：${validPool.length} 籤)`;

      // 按鈕狀態控制
      const drawBtn = document.getElementById("drawBtn");
      if (branchDrawCount >= 2) {
        drawBtn.disabled = true;
      } else if (validPool.length === 0) {
        drawBtn.disabled = true;
      } else {
        drawBtn.disabled = false;
      }
    }

    function draw() {
      if (isRolling) return;

      const validPool = getValidPool();
      if (validPool.length === 0) {
        alert("當前條件下沒有可抽取的籤了！");
        return;
      }

      if (branchDrawCount >= 2) {
        alert("本分館已抽滿 2 個委員會上限！請切換下一個分館。");
        return;
      }

      isRolling = true;
      const display = document.getElementById("resultDisplay");
      const drawBtn = document.getElementById("drawBtn");
      const isSongshan = document.getElementById("songshanToggle").checked;
      drawBtn.disabled = true;

      let counter = 0;
      const totalTicks = 20;
      const intervalTime = 50;

      // 跑馬燈效果
      const timer = setInterval(() => {
        const randomIndex = Math.floor(Math.random() * validPool.length);
        display.innerText = validPool[randomIndex];
        counter++;

        if (counter >= totalTicks) {
          clearInterval(timer);
          
          // 隨機選出標的
          const finalIndex = Math.floor(Math.random() * validPool.length);
          const selected = validPool[finalIndex];

          // 從真實總籤筒中移除一個該項目
          const poolIndex = currentPool.indexOf(selected);
          if (poolIndex !== -1) {
            currentPool.splice(poolIndex, 1);
          }

          branchDrawCount++;

          // 新增至歷史紀錄
          const historyList = document.getElementById("historyList");
          const li = document.createElement("li");
          const tag = isSongshan ? "[松山分館]" : "[分館]";
          li.innerText = `${tag} 抽出：${selected}`;
          historyList.appendChild(li);

          isRolling = false;

          // 核心邏輯判斷：
          // 1. 若抽到「館藏發展委員會」，該館立即結束（不再抽第 2 個）
          // 2. 若該館已滿 2 個，該館結束
          if (selected === "館藏發展委員會") {
            display.innerText = `🎯 抽中【館藏發展委員會】！本館任務完成（免抽第 2 個）`;
            branchDrawCount = 2; // 強制歸滿，禁止繼續抽
          } else if (branchDrawCount >= 2) {
            display.innerText = `🎉 抽出：${selected} (本館已滿 2 個)`;
          } else {
            display.innerText = `抽出：${selected} (請繼續抽第 2 個)`;
          }

          updateUI();
        }
      }, intervalTime);
    }

    function resetDraw() {
      if (isRolling) return;
      currentPool = [...basePool];
      branchDrawCount = 0;
      document.getElementById("songshanToggle").checked = false;
      document.getElementById("resultDisplay").innerText = "點擊「開始抽籤」按鈕";
      document.getElementById("historyList").innerHTML = "";
      updateUI();
    }

    // 初始化 UI
    updateUI();
  </script>
</body>
</html>
