<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺北市立圖書館 分館委員會抽籤系統 (水果盤模式)</title>
    <style>
        :root {
            --primary-color: #1b4332;
            --secondary-color: #2d6a4f;
            --accent-gold: #ffb703;
            --accent-red: #d90429;
            --bg-color: #081c15;
            --panel-bg: #113829;
            --card-bg: #1b4332;
            --text-light: #f8f9fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 10px;
            width: 100%;
            max-width: 900px;
        }

        header h1 {
            color: var(--accent-gold);
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 183, 3, 0.4);
        }

        header p {
            color: #b7e4c7;
            font-size: 0.95rem;
        }

        .main-container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .slot-machine-card {
            background: var(--panel-bg);
            border: 3px solid var(--accent-gold);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        .status-badge {
            background: #2d6a4f;
            color: #d8f3dc;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 1rem;
            display: inline-block;
            margin-bottom: 15px;
            border: 1px solid var(--accent-gold);
        }

        .current-target {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .slot-window {
            background: #000;
            border: 4px solid var(--accent-gold);
            border-radius: 12px;
            height: 120px;
            overflow: hidden;
            position: relative;
            margin: 0 auto 15px auto;
            max-width: 500px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .slot-reel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: top 0.1s ease-out;
        }

        .slot-item {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-gold);
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            width: 100%;
            padding: 0 10px;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-reset {
            background: #333;
            color: #ccc;
            border: 1px solid #555;
        }

        .btn-reset:hover {
            background: #d90429;
            color: #fff;
            border-color: #d90429;
        }

        .results-section {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--secondary-color);
        }

        .results-section h2 {
            color: var(--accent-gold);
            font-size: 1.3rem;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--secondary-color);
            padding-bottom: 8px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 15px;
        }

        /* 可點擊的分館卡片樣式 */
        .result-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            border: 2px solid var(--secondary-color);
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
            user-select: none;
        }

        .result-card:hover:not(.completed):not(.disabled) {
            transform: translateY(-3px);
            border-color: var(--accent-gold);
            box-shadow: 0 6px 15px rgba(255, 183, 3, 0.3);
            background: #22577a;
        }

        .result-card.spinning {
            border-color: var(--accent-gold);
            background: #2a6f97;
            animation: pulse 1s infinite alternate;
        }

        .result-card.completed {
            border-color: #52b788;
            opacity: 0.85;
            cursor: default;
            background: #143628;
        }

        .branch-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .branch-tag {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 12px;
            background: rgba(255,183,3,0.2);
            color: var(--accent-gold);
            border: 1px solid rgba(255,183,3,0.4);
        }

        .committee-list {
            font-size: 0.95rem;
            color: #d8f3dc;
            min-height: 32px;
        }

        .committee-tag {
            display: inline-block;
            background: rgba(255, 183, 3, 0.15);
            color: var(--accent-gold);
            padding: 4px 8px;
            border-radius: 4px;
            margin: 2px;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 183, 3, 0.3);
        }

        .click-hint {
            font-size: 0.8rem;
            color: #ffb703;
            margin-top: 5px;
            text-align: right;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-gold);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 5px var(--accent-gold); }
            100% { box-shadow: 0 0 20px var(--accent-gold); }
        }
    </style>
</head>
<body>

    <header>
        <h1>🎰 臺北市立圖書館 委員會點擊抽籤水果盤</h1>
        <p>👇 請直接點擊下方任意「分館卡片」進行拉霸抽籤</p>
    </header>

    <div class="main-container">
        <!-- 水果盤顯示區域 -->
        <div class="slot-machine-card">
            <div id="statusBadge" class="status-badge">等待點擊分館</div>
            <div id="currentTarget" class="current-target">👈 請點擊下方分館開始抽籤</div>

            <div class="slot-window">
                <div id="slotReel" class="slot-reel">
                    <div class="slot-item">點擊下方分館進行抽籤</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-reset" onclick="resetAll()">🔄 重置所有抽籤紀錄</button>
            </div>
        </div>

        <!-- 11 個分館卡片區域 -->
        <div class="results-section">
            <h2>📋 點擊各分館進行抽籤</h2>
            <div id="resultsGrid" class="results-grid"></div>
        </div>
    </div>

    <div id="toast" class="toast">提示訊息</div>

    <script>
        const ALL_BRANCHES = [
            "舊莊分館", "中崙分館", "三興分館", "民生分館", 
            "永春分館", "三民分館", "六合分館", "南港分館", 
            "松山分館", "啓明分館", "廣慈分館"
        ];

        const ALL_COMMITTEES = [
            "館藏發展委員會",
            "技術服務委員會",
            "讀者服務委員會",
            "推廣活動委員會",
            "資訊暨視聽服務委員會",
            "人力資源委員會",
            "分館興建規劃暨修建工程委員會",
            "為民服務暨業務考核委員會"
        ];

        let drawResults = {};
        let isSpinning = false;

        function init() {
            drawResults = {};
            ALL_BRANCHES.forEach(branch => {
                drawResults[branch] = [];
            });
            isSpinning = false;
            updateUI();
            renderResultsGrid();
            showReelText("點擊下方分館進行抽籤");
        }

        function isBranchCompleted(branch) {
            const drawn = drawResults[branch] || [];
            if (branch === "松山分館") {
                return drawn.length >= 1;
            }
            if (drawn.includes("館藏發展委員會")) {
                return true;
            }
            return drawn.length >= 2;
        }

        function getAvailableOptions(branch) {
            let options = [...ALL_COMMITTEES];
            if (branch === "松山分館") {
                options = options.filter(c => c !== "館藏發展委員會");
            }
            const existingDrawn = drawResults[branch] || [];
            options = options.filter(c => !existingDrawn.includes(c));
            return options;
        }

        function showReelText(text) {
            const reel = document.getElementById("slotReel");
            reel.style.transition = "none";
            reel.style.top = "0px";
            reel.innerHTML = `<div class="slot-item">${text}</div>`;
        }

        function renderResultsGrid() {
            const grid = document.getElementById("resultsGrid");
            grid.innerHTML = "";

            ALL_BRANCHES.forEach((branch, index) => {
                const card = document.createElement("div");
                card.id = `card-${index}`;
                card.className = "result-card";
                card.onclick = () => spinForBranch(branch, index);

                let tagText = branch === "松山分館" ? "特規：僅抽1項" : "可抽 2 項";

                card.innerHTML = `
                    <div class="branch-name">
                        <span>${branch}</span>
                        <span class="branch-tag">${tagText}</span>
                    </div>
                    <div class="committee-list" id="list-${index}">
                        <span style="color: #888;">尚未抽取</span>
                    </div>
                    <div class="click-hint" id="hint-${index}">👉 點擊開始抽籤</div>
                `;
                grid.appendChild(card);
            });
            updateCardHighlights();
        }

        function updateCardHighlights() {
            ALL_BRANCHES.forEach((branch, index) => {
                const card = document.getElementById(`card-${index}`);
                const listDiv = document.getElementById(`list-${index}`);
                const hintDiv = document.getElementById(`hint-${index}`);
                if (!card) return;

                const drawn = drawResults[branch] || [];

                // 更新選中的委員會標籤
                if (drawn.length > 0) {
                    listDiv.innerHTML = drawn.map(item => `<span class="committee-tag">${item}</span>`).join("");
                } else {
                    listDiv.innerHTML = `<span style="color: #888;">尚未抽取</span>`;
                }

                // 更新狀態與按鈕提示
                if (isBranchCompleted(branch)) {
                    card.classList.add("completed");
                    card.classList.remove("spinning");
                    hintDiv.innerText = "✅ 已完成";
                    hintDiv.style.color = "#52b788";
                } else {
                    card.classList.remove("completed");
                    const remain = (branch === "松山分館") ? 1 : (2 - drawn.length);
                    hintDiv.innerText = `👉 點擊抽第 ${drawn.length + 1} 項 (還差 ${remain} 項)`;
                    hintDiv.style.color = "#ffb703";
                }
            });
        }

        function spinForBranch(branch, index) {
            if (isSpinning) return;
            if (isBranchCompleted(branch)) {
                showToast(`【${branch}】已完成所有抽籤！`);
                return;
            }

            const options = getAvailableOptions(branch);
            if (options.length === 0) return;

            isSpinning = true;
            const currentDrawNum = (drawResults[branch] || []).length + 1;

            document.getElementById("statusBadge").innerText = "🎰 抽籤中...";
            document.getElementById("statusBadge").style.background = "#ffb703";
            document.getElementById("statusBadge").style.color = "#000";
            document.getElementById("currentTarget").innerText = `正在為【${branch}】抽取第 ${currentDrawNum} 個委員會...`;

            const card = document.getElementById(`card-${index}`);
            card.classList.add("spinning");

            const selected = options[Math.floor(Math.random() * options.length)];

            // 動畫設定
            const reel = document.getElementById("slotReel");
            let reelHtml = "";
            const totalAnimationItems = 25;

            for (let i = 0; i < totalAnimationItems; i++) {
                const randomOpt = ALL_COMMITTEES[Math.floor(Math.random() * ALL_COMMITTEES.length)];
                reelHtml += `<div class="slot-item">${randomOpt}</div>`;
            }
            reelHtml += `<div class="slot-item" style="color: #ffb703; font-size: 1.6rem;">🎉 ${selected}</div>`;

            reel.style.transition = "none";
            reel.style.top = "0px";
            reel.innerHTML = reelHtml;
            reel.offsetHeight;

            const targetTop = -(totalAnimationItems * 120);
            reel.style.transition = "top 2.2s cubic-bezier(0.15, 0.85, 0.35, 1.05)";
            reel.style.top = `${targetTop}px`;

            setTimeout(() => {
                isSpinning = false;
                card.classList.remove("spinning");
                drawResults[branch].push(selected);
                updateCardHighlights();

                document.getElementById("statusBadge").innerText = "等待點擊分館";
                document.getElementById("statusBadge").style.background = "#2d6a4f";
                document.getElementById("statusBadge").style.color = "#d8f3dc";
                document.getElementById("currentTarget").innerText = `【${branch}】抽中了：${selected}`;

                // 特殊提示
                if (selected === "館藏發展委員會" && branch !== "松山分館") {
                    showToast(`【${branch}】抽中館藏發展委員會，觸發免抽第二項規則！🎉`);
                } else if (branch === "松山分館") {
                    showToast(`【松山分館】已完成單項抽籤！👍`);
                }

            }, 2300);
        }

        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.innerText = msg;
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 3500);
        }

        function resetAll() {
            if (confirm("確定要重置所有分館的抽籤紀錄嗎？")) {
                init();
                showToast("已重置所有資料，請重新點擊分館進行抽籤");
            }
        }

        window.onload = init;
    </script>
</body>
</html>
