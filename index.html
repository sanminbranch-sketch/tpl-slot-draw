<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>臺北市立圖書館東區分館業務委員會抽籤系統</title>
    <style>
        :root {
            --primary-color: #1b4332;
            --secondary-color: #2d6a4f;
            --accent-gold: #ffb703;
            --accent-red: #d90429;
            --bg-color: #081c15;
            --panel-bg: #113829;
            --card-bg: #1b4332;
            --text-light: #f8f9fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 10px;
            width: 100%;
            max-width: 900px;
        }

        header h1 {
            color: var(--accent-gold);
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 183, 3, 0.4);
        }

        header p {
            color: #b7e4c7;
            font-size: 0.95rem;
        }

        .main-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 頂部水果盤區域 */
        .slot-machine-card {
            background: var(--panel-bg);
            border: 3px solid var(--accent-gold);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .status-badge {
            background: #2d6a4f;
            color: #d8f3dc;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 1rem;
            display: inline-block;
            margin-bottom: 12px;
            border: 1px solid var(--accent-gold);
        }

        .current-target {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 15px;
            min-height: 2.2rem;
        }

        .slot-window {
            background: #000;
            border: 4px solid var(--accent-gold);
            border-radius: 12px;
            height: 120px;
            overflow: hidden;
            position: relative;
            margin: 0 auto 15px auto;
            max-width: 500px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .slot-reel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: top 0.1s ease-out;
        }

        .slot-item {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--accent-gold);
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            width: 100%;
            padding: 0 10px;
            text-align: center;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* 拉霸大按鈕 */
        .btn-spin {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(180deg, #ffb703 0%, #fb8500 100%);
            color: #000;
            border: 2px solid #fff;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 183, 3, 0.4);
            transition: all 0.2s;
        }

        .btn-spin:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 183, 3, 0.7);
        }

        .btn-spin:disabled {
            background: #555;
            color: #888;
            border-color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-reset {
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: bold;
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-reset:hover {
            background: #d90429;
            color: #fff;
        }

        /* 下方分館列表區域 */
        .results-section {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--secondary-color);
        }

        .results-section h2 {
            color: var(--accent-gold);
            font-size: 1.3rem;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--secondary-color);
            padding-bottom: 8px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 15px;
        }

        .result-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            border: 2px solid var(--secondary-color);
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
        }

        .result-card:hover:not(.completed) {
            transform: translateY(-3px);
            border-color: var(--accent-gold);
            box-shadow: 0 6px 15px rgba(255, 183, 3, 0.3);
            background: #22577a;
        }

        .result-card.selected-active {
            border-color: #ffb703 !important;
            background: #2a6f97 !important;
            box-shadow: 0 0 15px rgba(255, 183, 3, 0.6);
        }

        .result-card.completed {
            border-color: #52b788;
            opacity: 0.85;
            cursor: default;
            background: #143628;
        }

        .branch-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .branch-tag {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 12px;
            background: rgba(255,183,3,0.2);
            color: var(--accent-gold);
            border: 1px solid rgba(255,183,3,0.4);
        }

        .committee-list {
            font-size: 0.95rem;
            color: #d8f3dc;
            min-height: 32px;
        }

        .committee-tag {
            display: inline-block;
            background: rgba(255, 183, 3, 0.15);
            color: var(--accent-gold);
            padding: 4px 8px;
            border-radius: 4px;
            margin: 2px;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 183, 3, 0.3);
        }

        .click-hint {
            font-size: 0.8rem;
            color: #ffb703;
            margin-top: 8px;
            text-align: right;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-gold);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎰 臺北市立圖書館 委員會抽籤系統</h1>
        <p>1. 點擊下方「分館」進行選取  ➔  2. 按上方「開始拉霸抽籤」按鈕</p>
    </header>

    <div class="main-container">
        <!-- 頂部水果盤顯示區 -->
        <div class="slot-machine-card">
                 <div id="currentTarget" class="current-target">👈 請先點選下方分館</div>
            <div class="slot-window">
                <div id="slotReel" class="slot-reel">
                    <div class="slot-item">Good Luck !</div>
                </div>
            </div>

            <div class="controls">
                <button id="spinBtn" class="btn-spin" onclick="startManualSpin()" disabled>🎰 開始拉霸抽籤</button>
                <button class="btn-reset" onclick="resetAll()">🔄 重置所有紀錄</button>
            </div>
        </div>

        <!-- 下方 11 個分館選單區 -->
        <div class="results-section">
            <h2>📋 各分館清單（點擊選擇分館）</h2>
            <div id="resultsGrid" class="results-grid"></div>
        </div>
    </div>

    <div id="toast" class="toast">提示訊息</div>

    <script>
        const ALL_BRANCHES = [
            "舊莊分館", "中崙分館", "三興分館", "民生分館", 
            "永春分館", "三民分館", "六合分館", "南港分館", 
            "松山分館", "啓明分館", "廣慈分館"
        ];

        const ALL_COMMITTEES = [
            "館藏發展委員會",
            "技術服務委員會",
            "讀者服務委員會",
            "推廣活動委員會",
            "資訊暨視聽服務委員會",
            "人力資源委員會",
            "分館興建規劃暨修建工程委員會",
            "為民服務暨業務考核委員會"
        ];

        let drawResults = {};
        let selectedBranch = null;
        let isSpinning = false;
        let isInitialized = false;

        function init() {
            if (isInitialized) return;
            isInitialized = true;

            drawResults = {};
            ALL_BRANCHES.forEach(branch => {
                drawResults[branch] = [];
            });
            selectedBranch = null;
            isSpinning = false;
            
            updateTopDisplay();
            renderResultsGrid();
            showReelText("Good Luck !");
        }

        function isBranchCompleted(branch) {
            const drawn = drawResults[branch] || [];
            if (branch === "松山分館") {
                return drawn.length >= 1;
            }
            if (drawn.includes("館藏發展委員會")) {
                return true;
            }
            return drawn.length >= 2;
        }

        function getCommitteeCounts() {
            const counts = {};
            ALL_COMMITTEES.forEach(c => counts[c] = 0);
            
            Object.values(drawResults).forEach(drawnList => {
                drawnList.forEach(c => {
                    if (counts[c] !== undefined) counts[c]++;
                });
            });
            return counts;
        }

        function getAvailableOptions(branch) {
            const drawnByThisBranch = drawResults[branch] || [];
            const globalCounts = getCommitteeCounts();

            return ALL_COMMITTEES.filter(c => {
                if (drawnByThisBranch.includes(c)) return false;
                if (branch === "松山分館" && c === "館藏發展委員會") return false;
                if (c === "館藏發展委員會" && globalCounts[c] >= 1) return false;
                if (c !== "館藏發展委員會" && globalCounts[c] >= 2) return false;

                return true;
            });
        }

        function showReelText(text) {
            const reel = document.getElementById("slotReel");
            if (reel) {
                reel.style.transition = "none";
                reel.style.top = "0px";
                reel.innerHTML = `<div class="slot-item">${text}</div>`;
            }
        }

        function renderResultsGrid() {
            const grid = document.getElementById("resultsGrid");
            if (!grid) return;
            grid.innerHTML = "";

            ALL_BRANCHES.forEach((branch, index) => {
                const card = document.createElement("div");
                card.id = `card-${index}`;
                card.className = "result-card";
                card.onclick = () => selectBranch(branch, index);

                let tagText = branch === "松山分館" ? "特規：僅抽1項" : "可抽 2 項";

                card.innerHTML = `
                    <div class="branch-name">
                        <span>${branch}</span>
                        <span class="branch-tag">${tagText}</span>
                    </div>
                    <div class="committee-list" id="list-${index}">
                        <span style="color: #888;">尚未抽取</span>
                    </div>
                    <div class="click-hint" id="hint-${index}">👉 點擊選擇</div>
                `;
                grid.appendChild(card);
            });
            updateCardHighlights();
        }

        function selectBranch(branch, index) {
            if (isSpinning) return;

            if (isBranchCompleted(branch)) {
                showToast(`【${branch}】已完成所有抽籤！`);
                return;
            }

            selectedBranch = branch;
            updateTopDisplay();
            updateCardHighlights();
            showReelText("Good Lucy"); // 點選分館後固定維持 [請開始]
        }

        function updateTopDisplay() {
            const badge = document.getElementById("statusBadge");
            const target = document.getElementById("currentTarget");
            const spinBtn = document.getElementById("spinBtn");

            if (!selectedBranch) {
                if (badge) {
                    badge.style.background = "#2d6a4f";
                    badge.style.color = "#d8f3dc";
                }
                if (target) target.innerText = "👈 請點選下方分館";
                if (spinBtn) spinBtn.disabled = true;
            } else {
                const drawn = drawResults[selectedBranch] || [];
                const currentDrawNum = drawn.length + 1;
                
                if (badge) {
                    badge.innerText = "已選擇分館";
                    badge.style.background = "#ffb703";
                    badge.style.color = "#000";
                }
                if (target) target.innerText = `已選擇：【${selectedBranch}】 (準備抽第 ${currentDrawNum} 項)`;
                if (spinBtn) spinBtn.disabled = false;
            }
        }

        function updateCardHighlights() {
            ALL_BRANCHES.forEach((branch, index) => {
                const card = document.getElementById(`card-${index}`);
                const listDiv = document.getElementById(`list-${index}`);
                const hintDiv = document.getElementById(`hint-${index}`);
                if (!card) return;

                const drawn = drawResults[branch] || [];

                if (drawn.length > 0) {
                    listDiv.innerHTML = drawn.map(item => `<span class="committee-tag">${item}</span>`).join("");
                } else {
                    listDiv.innerHTML = `<span style="color: #888;">尚未抽取</span>`;
                }

                card.classList.remove("selected-active");

                if (isBranchCompleted(branch)) {
                    card.classList.add("completed");
                    hintDiv.innerText = "✅ 已完成";
                    hintDiv.style.color = "#52b788";
                } else {
                    card.classList.remove("completed");
                    const remain = (branch === "松山分館") ? 1 : (2 - drawn.length);
                    hintDiv.innerText = `👉 點擊選擇 (還差 ${remain} 項)`;
                    hintDiv.style.color = "#ffb703";
                }

                if (branch === selectedBranch) {
                    card.classList.add("selected-active");
                    hintDiv.innerText = "🎯 目前選取中";
                }
            });
        }

        function startManualSpin() {
            if (isSpinning || !selectedBranch) return;

            const options = getAvailableOptions(selectedBranch);
            if (options.length === 0) {
                showToast(`【${selectedBranch}】無可抽取的委員會！`);
                return;
            }

            isSpinning = true;
            const spinBtn = document.getElementById("spinBtn");
            if (spinBtn) spinBtn.disabled = true;

            const currentDrawNum = (drawResults[selectedBranch] || []).length + 1;
            const badge = document.getElementById("statusBadge");
            const target = document.getElementById("currentTarget");

            if (badge) {
                badge.innerText = "🎰 正在拉霸中...";
                badge.style.background = "#ffb703";
                badge.style.color = "#000";
            }
            if (target) {
                target.innerText = `【${selectedBranch}】 正在抽取第 ${currentDrawNum} 個委員會...`;
            }

            const selected = options[Math.floor(Math.random() * options.length)];

            const reel = document.getElementById("slotReel");
            let reelHtml = "";
            const totalAnimationItems = 25;

            for (let i = 0; i < totalAnimationItems; i++) {
                const randomOpt = options[Math.floor(Math.random() * options.length)];
                reelHtml += `<div class="slot-item">${randomOpt}</div>`;
            }
            reelHtml += `<div class="slot-item" style="color: #ffb703; font-size: 1.7rem;">🎉 ${selected}</div>`;

            if (reel) {
                reel.style.transition = "none";
                reel.style.top = "0px";
                reel.innerHTML = reelHtml;
                reel.offsetHeight;

                const targetTop = -(totalAnimationItems * 120);
                reel.style.transition = "top 2.2s cubic-bezier(0.15, 0.85, 0.35, 1.05)";
                reel.style.top = `${targetTop}px`;
            }

            setTimeout(() => {
                isSpinning = false;
                const activeBranch = selectedBranch;
                drawResults[activeBranch].push(selected);

                if (isBranchCompleted(activeBranch)) {
                    selectedBranch = null;
                }

                updateTopDisplay();
                updateCardHighlights();

                if (badge) {
                    badge.innerText = "抽籤完成";
                    badge.style.background = "#52b788";
                    badge.style.color = "#fff";
                }
                if (target) {
                    target.innerText = `🎉 【${activeBranch}】 抽中了：${selected}`;
                }

                if (selected === "館藏發展委員會" && activeBranch !== "松山分館") {
                    showToast(`【${activeBranch}】恭喜您抽中館藏發展委員會，免抽第二個委員會！🎉`);
                } else if (activeBranch === "松山分館") {
                    showToast(`【松山分館】已完成單項抽籤！👍`);
                }

            }, 2300);
        }

        function showToast(msg) {
            const toast = document.getElementById("toast");
            if (!toast) return;
            toast.innerText = msg;
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 3500);
        }

        function resetAll() {
            if (confirm("確定要重置所有分館的抽籤紀錄嗎？")) {
                isInitialized = false;
                init();
                showToast("已重置所有資料，請重新選擇分館進行抽籤");
            }
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", init);
        } else {
            init();
        }
        window.onload = init;
    </script>
</body>
</html>
